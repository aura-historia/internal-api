                          currency: "EUR"
                          amount: 3000
                        newPrice:
                          currency: "EUR"
                          amount: 2999
                      timestamp: "2024-01-15T09:15:00Z"
        "400":
          description: Bad request - Invalid parameters
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
