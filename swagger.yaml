              description: CORS header
              schema:
                type: string
              example: "*"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationCollectionData"
              example:
                items: []
                size: 0
                searchAfter: null
                total: 0
        "400":
          description: Bad request – malformed request body or invalid query parameters.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                status: 400
                title: "Bad Request"
                error: "BAD_BODY_VALUE"
                detail: "Expected object. Got: string"
        "401":
          description: Unauthorized – invalid or missing JWT token.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                status: 401
                title: "Unauthorized"
                error: "UNAUTHORIZED"
        "500":
          description: Internal server error.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ApiError"
              example:
                status: 500
                title: "Internal Server Error"
                error: "INTERNAL_SERVER_ERROR"
    delete:
      summary: Delete all notifications
      description: |
        Deletes all notifications for the authenticated user.
        Returns 204 No Content on success.
        Requires valid Cognito JWT authentication.
      operationId: deleteAllNotifications
      tags:
