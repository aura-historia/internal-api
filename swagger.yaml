              schema:
                $ref: "#/components/schemas/ApiError"
              examples:
                invalid_sort_field:
                  summary: Invalid sort field
                  value:
                    status: 400
                    title: "Bad Request"
                    error: "BAD_QUERY_PARAMETER_VALUE"
                    source:
                      field: "sort"
                      sourceType: "query"
                    detail: "Expected any of: 'created'. Got: 'invalid'"
                invalid_order:
