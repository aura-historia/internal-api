        size:
          type: integer
          minimum: 0
          description: Number of products in the current page
          example: 21
        searchAfter:
          type: string
          format: date-time
          description: Cursor for the next page (RFC3339 timestamp). Present when there are more results.
          nullable: true
          example: "2024-01-15T08:00:00Z"
        total:
          type: integer
          minimum: 0
          description: Total number of products (optional, may not be available for cursor-based pagination)
          nullable: true
          example: 127

    WatchlistProductPatch:
      type: object
      description: Patch object for updating watchlist product settings
      properties:
        notifications:
          type: boolean
          description: Whether to enable or disable notifications for this watchlist product
          example: true
        state:
          allOf:
            - $ref: "#/components/schemas/PatchResourceStateData"
          nullable: true
          description: |
            Optional activation state update for this watchlist entry.
            `ACTIVE` reactivates the entry if the user's current tier still has watchlist quota.
            `INACTIVE_BY_USER` manually disables the entry.
            Omit to leave the current state unchanged.

    SortWatchlistProductFieldData:
      type: string
      enum: [created]
      description: |
        Fields available for sorting watchlist products:
        - created: Sort by when product was added to watchlist
      example: created

